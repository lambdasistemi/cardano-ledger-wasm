name: sync-cabal-version

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync-cabal-version:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Sync cabal version from release manifest
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          manifest_version="$(jq -r '."."' .release-please-manifest.json)"
          case "$manifest_version" in
            *.*.*) ;;
            *)
              echo "Manifest version must be x.y.z, got: $manifest_version" >&2
              exit 1
              ;;
          esac

          pvp_version="${manifest_version}.0"
          sed -i -E "s/^version:[[:space:]]*.*/version:       ${pvp_version}/" \
            cardano-ledger-wasm/cardano-ledger-wasm.cabal

          if git diff --quiet; then
            echo "Cabal version already matches manifest ${manifest_version}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cardano-ledger-wasm/cardano-ledger-wasm.cabal
          git commit -m "chore: sync cabal version to ${pvp_version}"
          git push origin "HEAD:${HEAD_REF}"
